<!DOCTYPE html>

<html class="light" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&amp;family=Manrope:wght@700;800&amp;family=Inter:wght@500&amp;family=Noto+Sans+JP:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        purple: {
                            50: '#f5f3ff',
                            100: '#ede9fe',
                            200: '#ddd6fe',
                            300: '#c4b5fd',
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                            700: '#6d28d9',
                            800: '#5b21b6',
                            900: '#4c1d95',
                        },
                        slate: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            400: '#94a3b8',
                            500: '#64748b',
                            900: '#0f172a',
                        }
                    },
                    fontFamily: {
                        "headline": ["Public Sans", "Noto Sans JP", "sans-serif"],
                        "body": ["Public Sans", "Noto Sans JP", "sans-serif"],
                        "label": ["Public Sans", "Noto Sans JP", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            font-family: 'Public Sans', 'Noto Sans JP', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">
<!-- TopAppBar (Transactional: Back arrow used) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-white/70 backdrop-blur-xl no-border tonal-shift-surface-container-low">
<button class="w-10 h-10 flex items-center justify-start text-purple-900 transition-colors hover:bg-purple-50 rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Manrope','Noto_Sans_JP'] headline-lg font-bold tracking-tight text-purple-900">タスク</h1>
<div class="w-10 h-10 flex items-center justify-end text-purple-900">
<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
</div>
</header>
<main class="flex-grow pt-24 pb-12 px-8 max-w-2xl mx-auto w-full">
<!-- Hero Section -->
<div class="mb-12">
<h2 class="text-4xl font-extrabold tracking-tight text-slate-900 mb-2">新規タスク</h2>
<p class="text-slate-500 font-medium">新しい目標を設定しましょう</p>
</div>
<!-- Form Section -->
<form class="space-y-10">
<!-- Title Input -->
<div class="group">
<label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 px-1">タスク名</label>
<input class="w-full bg-transparent border-0 border-b-2 border-slate-200 focus:border-purple-500 focus:ring-0 text-xl font-medium py-3 px-1 transition-all placeholder:text-slate-300" placeholder="何をする予定ですか？" type="text"/>
</div>
<!-- Category Pill Selectors -->
<div>
<label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-4 px-1">カテゴリー</label>
<div class="flex flex-wrap gap-3">
<button class="px-6 py-2.5 rounded-full bg-purple-600 text-white text-sm font-semibold shadow-sm hover:bg-purple-700 transition-all" type="button">仕事</button>
<button class="px-6 py-2.5 rounded-full bg-white border border-slate-200 text-slate-600 text-sm font-medium hover:border-purple-300 hover:text-purple-600 transition-all" type="button">プライベート</button>
<button class="px-6 py-2.5 rounded-full bg-white border border-slate-200 text-slate-600 text-sm font-medium hover:border-purple-300 hover:text-purple-600 transition-all" type="button">買い物</button>
<button class="px-6 py-2.5 rounded-full bg-white border border-slate-200 text-slate-600 text-sm font-medium hover:border-purple-300 hover:text-purple-600 transition-all" type="button">学習</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 text-slate-500 hover:bg-purple-50 hover:text-purple-600 transition-all" type="button">
<span class="material-symbols-outlined text-sm" data-icon="add">add</span>
</button>
</div>
</div>
<!-- Date and Time Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8">
<div class="group">
<label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 px-1">日付</label>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b-2 border-slate-200 focus:border-purple-500 focus:ring-0 text-lg font-medium py-3 px-1 transition-all" type="text" value="2023年10月24日"/>
<span class="material-symbols-outlined absolute right-2 bottom-3 text-slate-400" data-icon="calendar_today">calendar_today</span>
</div>
</div>
<div class="group">
<label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 px-1">時間</label>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b-2 border-slate-200 focus:border-purple-500 focus:ring-0 text-lg font-medium py-3 px-1 transition-all" type="text" value="09:00"/>
<span class="material-symbols-outlined absolute right-2 bottom-3 text-slate-400" data-icon="schedule">schedule</span>
</div>
</div>
</div>
<!-- Description -->
<div class="group">
<label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 px-1">詳細メモ</label>
<textarea class="w-full bg-transparent border-0 border-b-2 border-slate-200 focus:border-purple-500 focus:ring-0 text-lg font-medium py-3 px-1 transition-all resize-none placeholder:text-slate-300" placeholder="追加の情報を入力..." rows="3"></textarea>
</div>
<!-- Save Button -->
<div class="pt-6">
<button class="w-full bg-purple-900 text-white py-5 rounded-2xl text-lg font-bold shadow-xl shadow-purple-200 hover:bg-slate-900 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined" data-icon="check" style="font-variation-settings: 'FILL' 0; font-weight: 700;">check</span>
                    保存
                </button>
</div>
</form>
<!-- Decorative Element -->
<div class="mt-16 flex justify-center opacity-20">
<div class="w-32 h-1 bg-slate-300 rounded-full"></div>
</div>
</main>
<!-- Navigation suppressed because this is a focused Task Creation screen (Transactional Intent) -->
</body></html>
